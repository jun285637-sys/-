<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>竞彩/北单 模拟选号</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="logo">V 站情报 · 模拟选号</div>
      <nav class="main-nav">
        <a class="active" href="index.html">模拟选号</a>
        <a href="intel-list.html">情报列表</a>
        <a href="leagues.html">联赛资料</a>
        <a href="intel-admin.html">情报后台</a>
      </nav>
    </div>
  </header>

  <main class="container sim-page">
    <section class="sim-card">
      <div class="sim-top-tabs">
        <button class="sim-tab active" data-pool="jc">竞彩足球</button>
        <button class="sim-tab" data-pool="bd">北京单场</button>
      </div>
      <div class="sim-toolbar">
        <div class="sim-title">模拟选号区</div>
        <div class="sim-note">赔率与赛程均为演示数据，后续可替换外部 API</div>
      </div>
      <div class="table-wrap">
        <table class="pick-table">
          <thead>
            <tr>
              <th>场次</th>
              <th>联赛/时间</th>
              <th>主队 VS 客队</th>
              <th>让球</th>
              <th>主胜</th>
              <th>平</th>
              <th>客胜</th>
              <th>状态</th>
            </tr>
          </thead>
          <tbody id="selection-body"></tbody>
        </table>
      </div>
    </section>

    <aside class="sim-aside">
      <section class="sim-card">
        <div class="side-title">已选场次</div>
        <div id="pick-slip" class="pick-slip">未选择</div>
      </section>

      <section class="sim-card">
        <div class="side-title">开奖信息</div>
        <div class="draw-filter">
          <button class="filter-btn active" data-draw="all">全部</button>
          <button class="filter-btn" data-draw="jc">竞彩</button>
          <button class="filter-btn" data-draw="bd">北单</button>
        </div>
        <div id="draw-list" class="draw-list"></div>
      </section>
    </aside>
  </main>

  <script src="api-base.js"></script>
  <script>
    const selectionBody = document.getElementById("selection-body");
    const pickSlip = document.getElementById("pick-slip");
    const drawList = document.getElementById("draw-list");
    const poolTabs = Array.from(document.querySelectorAll(".sim-tab"));
    const drawTabs = Array.from(document.querySelectorAll(".filter-btn"));

    let activePoolType = "jc";
    let activeDrawType = "all";
    const selected = [];

    function setTabActive(tabs, field, value, cls) {
      tabs.forEach(function (tab) {
        if (tab.dataset[field] === value) tab.classList.add(cls);
        else tab.classList.remove(cls);
      });
    }

    function refreshSlip() {
      if (!selected.length) {
        pickSlip.textContent = "未选择";
        return;
      }
      pickSlip.innerHTML = selected
        .map(function (it, idx) {
          return (
            "<div class='slip-item'>" +
            "<span>" +
            (idx + 1) +
            ". " +
            it.match +
            "</span>" +
            "<strong>" +
            it.choice +
            "@" +
            it.odd +
            "</strong>" +
            "</div>"
          );
        })
        .join("");
    }

    function makeOddCell(value, matchText, choiceText) {
      const td = document.createElement("td");
      const btn = document.createElement("button");
      btn.className = "odd-cell-btn";
      btn.textContent = value;
      btn.addEventListener("click", function () {
        selected.push({
          match: matchText,
          choice: choiceText,
          odd: value
        });
        refreshSlip();
      });
      td.appendChild(btn);
      return td;
    }

    function renderSelection(rows) {
      selectionBody.innerHTML = "";
      if (!rows.length) {
        selectionBody.innerHTML = "<tr><td colspan='8' class='muted center'>当前类型暂无场次</td></tr>";
        return;
      }
      rows.forEach(function (m) {
        const tr = document.createElement("tr");
        const matchText = m.homeTeam + " vs " + m.awayTeam;

        tr.innerHTML =
          "<td>" + m.issueNo + "</td>" +
          "<td><div>" + m.leagueName + "</div><small>" + m.startTime + "</small></td>" +
          "<td>" + matchText + "</td>" +
          "<td>" + m.handicapLine + "</td>";

        tr.appendChild(makeOddCell(m.odds.home, matchText, "主胜"));
        tr.appendChild(makeOddCell(m.odds.draw, matchText, "平"));
        tr.appendChild(makeOddCell(m.odds.away, matchText, "客胜"));

        const statusTd = document.createElement("td");
        statusTd.innerHTML = "<span class='status-tag " + m.status + "'>" + m.status + "</span>";
        tr.appendChild(statusTd);
        selectionBody.appendChild(tr);
      });
    }

    function renderDraw(rows) {
      drawList.innerHTML = "";
      if (!rows.length) {
        drawList.innerHTML = "<div class='draw-item muted'>暂无开奖数据</div>";
        return;
      }
      rows.forEach(function (it) {
        const node = document.createElement("article");
        node.className = "draw-item";
        node.innerHTML =
          "<div class='draw-head'><strong>" +
          it.issueNo +
          "</strong><span>" +
          it.status +
          "</span></div>" +
          "<div class='draw-match'>" +
          it.matchName +
          "</div>" +
          "<div class='draw-result'>赛果: " +
          it.result +
          " / 玩法结果: " +
          it.betResult +
          "</div>" +
          "<div class='draw-time'>开奖时间: " +
          it.openTime +
          "</div>";
        drawList.appendChild(node);
      });
    }

    async function loadSelection() {
      const res = await fetch(apiUrl("/api/simulate/selection?poolType=" + activePoolType));
      const rows = await res.json();
      renderSelection(rows || []);
    }

    async function loadDraws() {
      const res = await fetch(apiUrl("/api/simulate/draw-results?poolType=" + activeDrawType));
      const rows = await res.json();
      renderDraw(rows || []);
    }

    poolTabs.forEach(function (tab) {
      tab.addEventListener("click", function () {
        activePoolType = tab.dataset.pool;
        setTabActive(poolTabs, "pool", activePoolType, "active");
        loadSelection();
      });
    });

    drawTabs.forEach(function (tab) {
      tab.addEventListener("click", function () {
        activeDrawType = tab.dataset.draw;
        setTabActive(drawTabs, "draw", activeDrawType, "active");
        loadDraws();
      });
    });

    Promise.all([loadSelection(), loadDraws()]).catch(function () {
      selectionBody.innerHTML = "<tr><td colspan='8' class='muted center'>加载失败</td></tr>";
      drawList.innerHTML = "<div class='draw-item muted'>开奖信息加载失败</div>";
    });
  </script>
</body>
</html>
